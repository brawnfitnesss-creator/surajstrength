<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Suraj Strength"/>
<meta name="theme-color" content="#080808"/>
<title>Suraj Strength System</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#080808;font-family:'Barlow Condensed',sans-serif;color:#fff;overflow:hidden}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
input,select,button{font-family:'Barlow Condensed',sans-serif}
select option{background:#111;color:#fff}
.screen{position:fixed;inset:0;overflow:hidden;display:none;flex-direction:column}
.screen.active{display:flex}

/* SETUP */
#setup{background:#080808;align-items:center;justify-content:center;overflow-y:auto;padding:48px 24px env(safe-area-inset-bottom)}
.logo-eyebrow{font-size:11px;letter-spacing:6px;color:#C9A84C;text-align:center;margin-bottom:6px}
.logo-title{font-size:50px;font-weight:800;line-height:1;letter-spacing:2px;text-align:center}
.logo-bar{width:60px;height:3px;background:#C9A84C;margin:14px auto 36px}
.setup-label{font-size:10px;letter-spacing:4px;color:#444;text-align:center;margin-bottom:18px}
.pr-card{background:#111;border:1px solid #1E1E1E;border-radius:14px;padding:16px 18px;margin-bottom:10px;display:flex;align-items:center;gap:14px}
.pr-icon{font-size:26px}
.pr-field{flex:1}
.pr-lbl{font-size:9px;letter-spacing:3px;color:#444;margin-bottom:4px}
.pr-inp{background:transparent;border:none;outline:none;color:#fff;font-size:28px;font-weight:700;width:90px}
.pr-kg{color:#333;font-size:13px}
.pr-tm{background:#1A1A1A;border-radius:8px;padding:6px 12px;font-size:11px;color:#C9A84C;letter-spacing:1px;white-space:nowrap;margin-left:auto}
.start-btn{width:100%;margin-top:22px;padding:18px;background:#C9A84C;border:none;border-radius:14px;font-size:15px;font-weight:800;letter-spacing:4px;color:#000;cursor:pointer}

/* TOP BAR */
.topbar{flex-shrink:0;background:#080808;border-bottom:1px solid #111;padding:10px 16px;padding-top:calc(10px + env(safe-area-inset-top))}
.topbar-row{display:flex;align-items:center;justify-content:space-between}
.topbar-eyebrow{font-size:9px;letter-spacing:4px;color:#333}
.topbar-title{font-size:18px;font-weight:800;letter-spacing:1px;line-height:1.1}
.topbar-right{text-align:right}
.topbar-rlabel{font-size:9px;letter-spacing:2px;color:#333}
.topbar-count{font-size:20px;font-weight:800;line-height:1}

/* NAV BAR */
.navbar{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:#080808;border-bottom:1px solid #111;gap:8px}
.nav-btn{flex:0 0 auto;padding:8px 16px;border-radius:10px;border:1px solid #222;background:#111;color:#888;font-size:11px;font-weight:700;letter-spacing:2px;cursor:pointer;display:flex;align-items:center;gap:6px}
.nav-btn:active{background:#1A1A1A}
.nav-btn.disabled{opacity:0.3;pointer-events:none}
.nav-center{flex:1;text-align:center}
.nav-position{font-size:10px;letter-spacing:3px;color:#444}
.nav-page{font-size:13px;font-weight:800;color:#C9A84C;letter-spacing:1px}

/* BOTTOM TABS */
.bottom-tabs{flex-shrink:0;display:flex;background:#080808;border-top:1px solid #111;padding-bottom:env(safe-area-inset-bottom)}
.btab{flex:1;padding:12px 4px;text-align:center;cursor:pointer;border:none;background:transparent}
.btab-icon{font-size:20px}
.btab-label{font-size:8px;letter-spacing:2px;color:#444;margin-top:3px;font-weight:700}
.btab.active .btab-label{color:#C9A84C}

/* SCROLL */
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.scroll-inner{padding-bottom:20px}

/* WEEK TABS */
.week-scroll{flex-shrink:0;display:flex;gap:8px;overflow-x:auto;padding:10px 16px 8px;scrollbar-width:none}
.week-scroll::-webkit-scrollbar{display:none}
.wtab{flex:0 0 auto;padding:8px 16px;border-radius:10px;cursor:pointer;border:1px solid #1A1A1A;background:#0F0F0F}
.wtab-num{font-size:11px;font-weight:700;letter-spacing:2px}
.wtab.active .wtab-num{color:#000}
.wtab:not(.active) .wtab-num{color:#555}
.wtab-phase{font-size:8px;letter-spacing:1px;margin-top:2px}
.wtab.active .wtab-phase{color:#00000055}
.wtab:not(.active) .wtab-phase{color:#2A2A2A}

/* DAY TABS */
.day-tabs{flex-shrink:0;display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:0 16px 10px}
.dtab{padding:8px 4px;border-radius:10px;cursor:pointer;border:1px solid #1A1A1A;background:#0F0F0F;text-align:center}
.dtab-icon{font-size:18px}
.dtab-label{font-size:9px;font-weight:700;letter-spacing:1px;margin-top:3px}
.dtab.active .dtab-label{color:#000}
.dtab:not(.active) .dtab-label{color:#444}
.dtab.complete:not(.active) .dtab-label{color:#27AE60}
.dtab-count{font-size:8px;margin-top:1px}
.dtab.active .dtab-count{color:#00000055}
.dtab:not(.active) .dtab-count{color:#2A2A2A}
.dtab.complete:not(.active) .dtab-count{color:#1E5A24}

/* DAY HEADER */
.day-hdr{padding:14px 16px 12px;border-bottom:1px solid #111;margin-bottom:12px}
.day-hdr-top{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.day-icon-box{width:44px;height:44px;border-radius:12px;background:#111;border:1px solid #1E1E1E;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.day-eyebrow{font-size:10px;letter-spacing:4px}
.day-name{font-size:20px;font-weight:800;letter-spacing:1px;line-height:1.1}
.day-sub{font-size:11px;color:#444;margin-top:1px}
.prog-row{display:flex;justify-content:space-between;margin-bottom:5px}
.prog-label{font-size:9px;letter-spacing:2px;color:#333}
.prog-count{font-size:10px;letter-spacing:1px;font-weight:700}
.prog-track{height:4px;background:#1A1A1A;border-radius:4px;overflow:hidden}
.prog-fill{height:100%;border-radius:4px;transition:width .35s ease}

/* EXERCISE CARD */
.ex-card{background:#0F0F0F;border:1px solid #1A1A1A;border-radius:16px;margin:0 16px 12px;overflow:hidden}
.ex-card.all-done{background:#0A1A10;border-color:#1A3A20}
.ex-hdr{padding:12px 14px 10px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #151515}
.ex-name{font-size:16px;font-weight:800;letter-spacing:.5px;line-height:1.2}
.ex-card.all-done .ex-name{color:#27AE60}
.weak-badge{display:inline-block;font-size:7px;letter-spacing:2px;color:#C9A84C;background:#1A1500;border:1px solid #C9A84C;border-radius:4px;padding:2px 5px;margin-left:7px;vertical-align:middle}
.ex-meta{font-size:10px;color:#333;letter-spacing:2px;margin-top:2px}
.ex-pct{color:#C9A84C;margin-left:6px}
.ring-wrap{position:relative;width:40px;height:40px;flex-shrink:0}
.ring-inner{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800}

/* SETS TABLE */
.sets-wrap{padding:0 12px 10px}
.tbl-header{display:grid;grid-template-columns:28px 1fr 52px 32px;gap:6px;padding:7px 2px 5px;border-bottom:1px solid #1A1A1A;margin-bottom:2px}
.tbl-lbl{font-size:8px;letter-spacing:2px;color:#2E2E2E;text-align:center}
.set-row{display:grid;grid-template-columns:28px 1fr 52px 32px;gap:6px;align-items:center;padding:6px 2px;border-bottom:1px solid #111}
.set-row:last-child{border-bottom:none}
.set-row.done-row{background:rgba(39,174,96,0.05);border-radius:8px;padding:6px 5px;margin:0 -5px}
.set-bubble{width:28px;height:28px;border-radius:7px;background:#1A1A1A;border:1px solid #252525;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#3A3A3A}
.set-row.done-row .set-bubble{background:#0D3320;border-color:#27AE60;color:#27AE60}
.wt-cell{background:#141414;border:1px solid #1E1E1E;border-radius:9px;padding:5px 9px}
.wt-cell:focus-within{border-color:#C9A84C44}
.cell-lbl{font-size:7px;letter-spacing:2px;color:#2E2E2E;margin-bottom:1px}
.wt-inp{background:transparent;border:none;outline:none;color:#fff;font-size:19px;font-weight:700;width:100%;line-height:1}
.wt-inp.pr-hi{color:#F0D080}
.wt-target{font-size:8px;color:#252525;margin-top:1px}
.reps-cell{background:#141414;border:1px solid #1E1E1E;border-radius:9px;padding:5px 7px;text-align:center}
.reps-cell:focus-within{border-color:#C9A84C44}
.reps-inp{background:transparent;border:none;outline:none;font-size:19px;font-weight:700;width:100%;text-align:center;line-height:1;color:#fff}
.reps-inp.missed{color:#FF4444}
.reps-inp.nailed{color:#27AE60}
.done-btn{width:32px;height:32px;border-radius:8px;background:#141414;border:2px solid #1E1E1E;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;color:transparent}
.done-btn.on{background:#27AE60;border-color:#27AE60;color:#fff}

/* SUMMARY */
.ex-summary{display:flex;gap:6px;padding:8px 12px;background:#0A0A0A;border-top:1px solid #111;flex-wrap:wrap}
.chip{flex:1;min-width:70px;background:#111;border:1px solid #1A1A1A;border-radius:8px;padding:5px 7px;text-align:center}
.chip-lbl{font-size:7px;letter-spacing:2px;color:#333}
.chip-val{font-size:14px;font-weight:800;display:block;margin-top:1px;letter-spacing:0}
.chip-val.gd{color:#C9A84C}
.chip-val.ok{color:#27AE60}
.chip-val.no{color:#FF5555}

/* SAVED BANNER */
.saved-banner{position:fixed;top:calc(60px + env(safe-area-inset-top));left:50%;transform:translateX(-50%);background:#27AE60;color:#fff;padding:8px 20px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:2px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
.saved-banner.show{opacity:1}

/* PROGRESS PAGE */
.progress-page{padding:16px}
.progress-title{font-size:11px;letter-spacing:4px;color:#C9A84C;margin-bottom:4px}
.progress-heading{font-size:24px;font-weight:800;margin-bottom:20px}
.graph-card{background:#0F0F0F;border:1px solid #1A1A1A;border-radius:16px;margin-bottom:14px;overflow:hidden}
.graph-hdr{padding:12px 14px 8px;border-bottom:1px solid #151515}
.graph-ex-name{font-size:15px;font-weight:800}
.graph-meta{font-size:9px;color:#444;letter-spacing:2px;margin-top:2px}
.graph-body{padding:14px}
canvas.chart{width:100%;height:120px;display:block}
.graph-stats{display:flex;gap:8px;padding:0 14px 14px}
.gstat{flex:1;background:#141414;border-radius:8px;padding:8px;text-align:center}
.gstat-lbl{font-size:7px;letter-spacing:2px;color:#333}
.gstat-val{font-size:16px;font-weight:800;color:#C9A84C;display:block;margin-top:2px}
.no-data{padding:30px;text-align:center;color:#333;font-size:11px;letter-spacing:2px}
</style>
</head>
<body>

<div class="saved-banner" id="saved-banner">✓ SAVED</div>

<!-- SETUP -->
<div class="screen active" id="setup">
  <div class="logo-eyebrow">SURAJ</div>
  <div class="logo-title">STRENGTH<br/>SYSTEM</div>
  <div class="logo-bar"></div>
  <div class="setup-label">ENTER YOUR 1 REP MAXES</div>
  <div id="pr-cards"></div>
  <button class="start-btn" onclick="go()">START PROGRAM ⚡</button>
</div>

<!-- MAIN APP -->
<div class="screen" id="app">
  <div class="topbar">
    <div class="topbar-row">
      <div>
        <div class="topbar-eyebrow">SURAJ STRENGTH SYSTEM</div>
        <div class="topbar-title" id="tb-title">WEEK 1</div>
      </div>
      <div class="topbar-right">
        <div class="topbar-rlabel">WEEK DONE</div>
        <div class="topbar-count" id="tb-count">0<span style="color:#222;font-size:13px">/0</span></div>
      </div>
    </div>
  </div>

  <!-- NAV BAR -->
  <div class="navbar" id="navbar">
    <button class="nav-btn" id="btn-prev" onclick="navPrev()">← PREV</button>
    <div class="nav-center">
      <div class="nav-position" id="nav-pos">WEEK 1 · DAY 1</div>
      <div class="nav-page" id="nav-page">LOWER POWER</div>
    </div>
    <button class="nav-btn" id="btn-next" onclick="navNext()">NEXT →</button>
  </div>

  <div class="week-scroll" id="week-tabs"></div>
  <div class="day-tabs" id="day-tabs"></div>

  <div class="scroll-area" id="workout-scroll">
    <div class="scroll-inner" id="day-content"></div>
  </div>

  <!-- BOTTOM TABS -->
  <div class="bottom-tabs">
    <button class="btab active" id="tab-workout" onclick="showTab('workout')">
      <div class="btab-icon">🏋️</div>
      <div class="btab-label">WORKOUT</div>
    </button>
    <button class="btab" id="tab-progress" onclick="showTab('progress')">
      <div class="btab-icon">📈</div>
      <div class="btab-label">PROGRESS</div>
    </button>
  </div>
</div>

<!-- PROGRESS PAGE (inside app scroll area, swapped in) -->
<div id="progress-content" style="display:none">
  <div class="progress-page">
    <div class="progress-title">YOUR JOURNEY</div>
    <div class="progress-heading">PROGRESS CHARTS</div>
    <div id="charts-container"></div>
  </div>
</div>

<script>
const GOLD="#C9A84C";
const WM={
  1:{phase:"BASE BUILDING",  color:"#C9A84C",bump:0},
  2:{phase:"PROGRESSION",    color:"#C9A84C",bump:.025},
  3:{phase:"INTENSITY PEAK", color:"#C9A84C",bump:.05},
  4:{phase:"DELOAD",         color:"#6B9F6B",bump:-.05},
  5:{phase:"VOLUME PEAK",    color:"#C9A84C",bump:.075},
  6:{phase:"STRENGTH PEAK",  color:"#E8C060",bump:.1},
};
const DM={
  1:{name:"LOWER POWER",      icon:"🦵",sub:"Quad + Hamstring"},
  2:{name:"UPPER POWER",      icon:"💪",sub:"Chest + Shoulders"},
  3:{name:"POSTERIOR CHAIN",  icon:"🏋️",sub:"Back + Deadlift"},
  4:{name:"UPPER HYPERTROPHY",icon:"💎",sub:"Arms + Side Delts"},
};
const PROG=[
  {day:1,ex:"Back Squat",                sets:4,reps:6, pct:.75,tm:"squat",   weak:0},
  {day:1,ex:"Romanian Deadlift",         sets:3,reps:10,pct:.60,tm:"dl",      weak:0},
  {day:1,ex:"Leg Press",                 sets:3,reps:12,pct:0,  tm:"",        weak:0},
  {day:1,ex:"Leg Curl (Machine)",        sets:3,reps:12,pct:0,  tm:"",        weak:0},
  {day:1,ex:"Lateral Raise",             sets:4,reps:15,pct:0,  tm:"",        weak:1},
  {day:1,ex:"Weighted Crunch",           sets:3,reps:15,pct:0,  tm:"",        weak:1},
  {day:2,ex:"Bench Press",               sets:4,reps:6, pct:.75,tm:"bench",   weak:0},
  {day:2,ex:"Overhead Press",            sets:3,reps:8, pct:.70,tm:"ohp",     weak:0},
  {day:2,ex:"Incline DB Press",          sets:3,reps:10,pct:0,  tm:"",        weak:0},
  {day:2,ex:"Cable Lateral Raise",       sets:4,reps:15,pct:0,  tm:"",        weak:1},
  {day:2,ex:"EZ-Bar Curl",               sets:3,reps:12,pct:0,  tm:"",        weak:1},
  {day:2,ex:"Overhead Tricep Extension", sets:3,reps:12,pct:0,  tm:"",        weak:1},
  {day:3,ex:"Deadlift",                  sets:4,reps:5, pct:.80,tm:"dl",      weak:0},
  {day:3,ex:"Barbell Row",               sets:4,reps:8, pct:.65,tm:"bench",   weak:0},
  {day:3,ex:"Pull-Up / Lat Pulldown",    sets:3,reps:10,pct:0,  tm:"",        weak:0},
  {day:3,ex:"Face Pull",                 sets:3,reps:15,pct:0,  tm:"",        weak:1},
  {day:3,ex:"Hammer Curl",               sets:3,reps:12,pct:0,  tm:"",        weak:1},
  {day:3,ex:"Cable Crunch",              sets:3,reps:15,pct:0,  tm:"",        weak:1},
  {day:4,ex:"Front Squat",               sets:3,reps:6, pct:.70,tm:"squat",   weak:0},
  {day:4,ex:"Bench Press (Paused)",      sets:3,reps:6, pct:.70,tm:"bench",   weak:0},
  {day:4,ex:"DB Lateral Raise",          sets:5,reps:15,pct:0,  tm:"",        weak:1},
  {day:4,ex:"Incline DB Curl",           sets:3,reps:12,pct:0,  tm:"",        weak:1},
  {day:4,ex:"Skull Crushers",            sets:3,reps:12,pct:0,  tm:"",        weak:1},
  {day:4,ex:"Hanging Leg Raise",         sets:3,reps:15,pct:0,  tm:"",        weak:1},
];

// ── STATE ─────────────────────────────────────────────────────────────────────
let prs={squat:100,bench:80,dl:140,ohp:60};
let cW=1,cD=1;
let LOG={};
let curTab="workout";

// Navigation: flat list of all week/day combos
const PAGES=[];
for(let w=1;w<=6;w++) for(let d=1;d<=4;d++) PAGES.push({w,d});
let pageIdx=0;

function tm(k){return Math.round(prs[k]*.9/2.5)*2.5;}
function tgt(pct,tmk,wk){
  if(!pct||!tmk)return null;
  return Math.round(tm(tmk)*(pct+WM[wk].bump)/2.5)*2.5;
}
function eid(ex){return ex.replace(/[\s\/\(\)\.]/g,"_");}

// ── STORAGE ───────────────────────────────────────────────────────────────────
function saveAll(){
  try{
    localStorage.setItem("sss_log",JSON.stringify(LOG));
    localStorage.setItem("sss_prs",JSON.stringify(prs));
    localStorage.setItem("sss_page",JSON.stringify({cW,cD,pageIdx}));
    showSaved();
  }catch(e){}
}

function loadAll(){
  try{
    const l=localStorage.getItem("sss_log");
    const p=localStorage.getItem("sss_prs");
    const pg=localStorage.getItem("sss_page");
    if(l) LOG=JSON.parse(l);
    if(p) prs=JSON.parse(p);
    if(pg){const v=JSON.parse(pg);cW=v.cW;cD=v.cD;pageIdx=v.pageIdx||0;}
    return !!(l&&p);
  }catch(e){return false;}
}

function showSaved(){
  const b=document.getElementById("saved-banner");
  b.classList.add("show");
  setTimeout(()=>b.classList.remove("show"),1500);
}

function initLog(){
  LOG={};
  for(let w=1;w<=6;w++){
    LOG[w]={};
    for(let d=1;d<=4;d++){
      LOG[w][d]={};
      PROG.filter(e=>e.day===d).forEach(e=>{
        LOG[w][d][e.ex]=Array.from({length:e.sets},()=>({wt:"",reps:"",done:false}));
      });
    }
  }
}

function ensureLog(){
  // Make sure all weeks/days/exercises exist (in case new exercises were added)
  for(let w=1;w<=6;w++){
    if(!LOG[w])LOG[w]={};
    for(let d=1;d<=4;d++){
      if(!LOG[w][d])LOG[w][d]={};
      PROG.filter(e=>e.day===d).forEach(e=>{
        if(!LOG[w][d][e.ex])
          LOG[w][d][e.ex]=Array.from({length:e.sets},()=>({wt:"",reps:"",done:false}));
      });
    }
  }
}

// ── SETUP ─────────────────────────────────────────────────────────────────────
function renderSetup(){
  document.getElementById("pr-cards").innerHTML=[
    {key:"squat",label:"SQUAT",icon:"🏋️"},
    {key:"bench",label:"BENCH PRESS",icon:"💪"},
    {key:"dl",   label:"DEADLIFT",icon:"⚡"},
    {key:"ohp",  label:"OVERHEAD PRESS",icon:"🔱"},
  ].map(({key,label,icon})=>`
    <div class="pr-card">
      <div class="pr-icon">${icon}</div>
      <div class="pr-field">
        <div class="pr-lbl">${label}</div>
        <div style="display:flex;align-items:baseline;gap:6px">
          <input class="pr-inp" type="number" inputmode="decimal" value="${prs[key]}"
            oninput="prs['${key}']=+this.value||0;document.getElementById('tm${key}').textContent='TM: '+Math.round(prs['${key}']*.9/2.5)*2.5+' kg'"/>
          <span class="pr-kg">kg</span>
        </div>
      </div>
      <div class="pr-tm" id="tm${key}">TM: ${tm(key)} kg</div>
    </div>`).join("");
}

function go(){
  initLog();
  saveAll();
  document.getElementById("setup").classList.remove("active");
  document.getElementById("app").classList.add("active");
  renderAll();
}

// ── COUNTS ────────────────────────────────────────────────────────────────────
function wkCnt(w){
  let dn=0,tot=0;
  for(let d=1;d<=4;d++) PROG.filter(e=>e.day===d).forEach(e=>{
    (LOG[w]&&LOG[w][d]&&LOG[w][d][e.ex]||[]).forEach(s=>{dn+=s.done?1:0;tot++;});
  });
  return{dn,tot};
}
function dyCnt(w,d){
  let dn=0,tot=0;
  PROG.filter(e=>e.day===d).forEach(e=>{
    (LOG[w]&&LOG[w][d]&&LOG[w][d][e.ex]||[]).forEach(s=>{dn+=s.done?1:0;tot++;});
  });
  return{dn,tot};
}

// ── NAVIGATION ────────────────────────────────────────────────────────────────
function navPrev(){
  if(pageIdx>0){
    pageIdx--;
    const{w,d}=PAGES[pageIdx];
    cW=w;cD=d;
    renderAll();
    document.getElementById("workout-scroll").scrollTop=0;
  }
}
function navNext(){
  if(pageIdx<PAGES.length-1){
    pageIdx++;
    const{w,d}=PAGES[pageIdx];
    cW=w;cD=d;
    renderAll();
    document.getElementById("workout-scroll").scrollTop=0;
  }
}
function renderNavbar(){
  const dm=DM[cD];
  document.getElementById("nav-pos").textContent=`WEEK ${cW} · DAY ${cD}`;
  document.getElementById("nav-page").textContent=dm.name;
  document.getElementById("btn-prev").classList.toggle("disabled",pageIdx===0);
  document.getElementById("btn-next").classList.toggle("disabled",pageIdx===PAGES.length-1);
}

// ── TABS ──────────────────────────────────────────────────────────────────────
function showTab(tab){
  curTab=tab;
  document.getElementById("tab-workout").classList.toggle("active",tab==="workout");
  document.getElementById("tab-progress").classList.toggle("active",tab==="progress");

  const wkScroll=document.getElementById("week-tabs");
  const dyTabs=document.getElementById("day-tabs");
  const navbar=document.getElementById("navbar");
  const wkContent=document.getElementById("workout-scroll");

  if(tab==="workout"){
    wkScroll.style.display="flex";
    dyTabs.style.display="grid";
    navbar.style.display="flex";
    document.getElementById("day-content").innerHTML="";
    wkContent.innerHTML='<div class="scroll-inner" id="day-content"></div>';
    renderDay();
  } else {
    wkScroll.style.display="none";
    dyTabs.style.display="none";
    navbar.style.display="none";
    wkContent.innerHTML='<div class="scroll-inner" id="progress-inner"></div>';
    renderProgressCharts();
  }
}

// ── RENDER ALL ────────────────────────────────────────────────────────────────
function renderAll(){
  renderTopbar();
  renderNavbar();
  renderWkTabs();
  renderDyTabs();
  if(curTab==="workout") renderDay();
}

function renderTopbar(){
  const wm=WM[cW];
  document.getElementById("tb-title").textContent=`WEEK ${cW} — ${wm.phase}`;
  document.getElementById("tb-title").style.color=wm.color;
  const{dn,tot}=wkCnt(cW);
  document.getElementById("tb-count").innerHTML=
    `<span style="color:${dn===tot&&tot>0?'#27AE60':wm.color}">${dn}</span><span style="color:#222;font-size:13px">/${tot}</span>`;
}

function renderWkTabs(){
  document.getElementById("week-tabs").innerHTML=[1,2,3,4,5,6].map(w=>`
    <div class="wtab ${w===cW?'active':''}"
      style="${w===cW?'background:'+WM[w].color+';border-color:'+WM[w].color:''}"
      onclick="swWk(${w})">
      <div class="wtab-num">WK ${w}</div>
      <div class="wtab-phase">${WM[w].phase.split(" ")[0]}</div>
    </div>`).join("");
}

function renderDyTabs(){
  const wc=WM[cW].color;
  document.getElementById("day-tabs").innerHTML=[1,2,3,4].map(d=>{
    const{dn,tot}=dyCnt(cW,d);
    const full=dn===tot&&tot>0,act=d===cD;
    return`<div class="dtab ${act?'active':''} ${full&&!act?'complete':''}"
      style="${act?'background:'+wc+';border-color:'+wc:''}"
      onclick="swDy(${d})">
      <div class="dtab-icon">${DM[d].icon}</div>
      <div class="dtab-label">DAY ${d}</div>
      <div class="dtab-count">${dn}/${tot}</div>
    </div>`;
  }).join("");
}

function renderDay(){
  const dc=document.getElementById("day-content");
  if(!dc)return;
  const w=cW,d=cD,wm=WM[w],dm=DM[d];
  const{dn,tot}=dyCnt(w,d);
  const pct=tot?dn/tot:0,full=dn===tot&&tot>0;
  const C=2*Math.PI*17;

  let h=`<div class="day-hdr">
    <div class="day-hdr-top">
      <div class="day-icon-box">${dm.icon}</div>
      <div>
        <div class="day-eyebrow" style="color:${wm.color}">DAY ${d}</div>
        <div class="day-name">${dm.name}</div>
        <div class="day-sub">${dm.sub}</div>
      </div>
    </div>
    <div class="prog-row">
      <span class="prog-label">SESSION PROGRESS</span>
      <span class="prog-count" style="color:${full?'#27AE60':wm.color}">${dn} / ${tot} SETS</span>
    </div>
    <div class="prog-track"><div class="prog-fill" style="width:${pct*100}%;background:${full?'#27AE60':wm.color}"></div></div>
  </div>`;

  PROG.filter(e=>e.day===d).forEach(ex=>{
    const sets=LOG[w][d][ex.ex];
    const exDn=sets.filter(s=>s.done).length,allDn=exDn===sets.length;
    const tarWt=tgt(ex.pct,ex.tm,w);
    const adjPct=ex.pct?Math.round((ex.pct+wm.bump)*100):0;
    const id=eid(ex.ex);
    const wts=sets.map(s=>parseFloat(s.wt)).filter(v=>!isNaN(v)&&v>0);
    const rps=sets.map(s=>parseInt(s.reps)).filter(v=>!isNaN(v)&&v>0);
    const maxWt=wts.length?Math.max(...wts):null;
    const avgR=rps.length?(rps.reduce((a,b)=>a+b,0)/rps.length).toFixed(1):null;
    const vol=sets.reduce((a,s)=>{const wv=parseFloat(s.wt)||0,rv=parseInt(s.reps)||0;return a+wv*rv;},0);

    const rows=sets.map((s,i)=>{
      const aw=parseFloat(s.wt)||0,rd=parseInt(s.reps)||0;
      const isPR=aw>0&&tarWt&&aw>tarWt;
      const missed=rd>0&&rd<ex.reps,nailed=rd>0&&rd>=ex.reps;
      return`<div class="set-row ${s.done?'done-row':''}" id="sr-${id}-${i}">
        <div class="set-bubble">${i+1}</div>
        <div class="wt-cell">
          <div class="cell-lbl">WEIGHT (kg)</div>
          <input class="wt-inp ${isPR?'pr-hi':''}" type="number" inputmode="decimal"
            value="${s.wt}" placeholder="${tarWt??'DB'}"
            onchange="upd('${ex.ex}',${i},'wt',this.value)"/>
          ${tarWt?`<div class="wt-target">target: ${tarWt} kg</div>`:''}
        </div>
        <div class="reps-cell">
          <div class="cell-lbl">REPS</div>
          <input class="reps-inp ${missed?'missed':nailed?'nailed':''}" type="number" inputmode="numeric"
            value="${s.reps}" placeholder="${ex.reps}"
            onchange="upd('${ex.ex}',${i},'reps',this.value)"/>
        </div>
        <button class="done-btn ${s.done?'on':''}" onclick="tog('${ex.ex}',${i})">✓</button>
      </div>`;
    }).join("");

    const summaryHtml=(wts.length||rps.length)?`
      <div class="ex-summary">
        ${maxWt!==null?`<div class="chip"><div class="chip-lbl">BEST SET</div><span class="chip-val gd">${maxWt} kg</span></div>`:''}
        ${avgR!==null?`<div class="chip"><div class="chip-lbl">AVG REPS</div><span class="chip-val ${parseFloat(avgR)>=ex.reps?'ok':'no'}">${avgR}</span></div>`:''}
        ${vol>0?`<div class="chip"><div class="chip-lbl">VOLUME</div><span class="chip-val gd">${vol.toLocaleString()} kg</span></div>`:''}
        <div class="chip"><div class="chip-lbl">SETS DONE</div><span class="chip-val ${allDn?'ok':''}">${exDn}/${sets.length}</span></div>
      </div>`:'';

    h+=`<div class="ex-card ${allDn?'all-done':''}" id="exc-${id}">
      <div class="ex-hdr">
        <div style="flex:1;min-width:0">
          <div class="ex-name">${ex.ex}${ex.weak?'<span class="weak-badge">WEAK POINT</span>':''}</div>
          <div class="ex-meta">${sets.length} SETS × ${ex.reps} REPS${adjPct?`<span class="ex-pct">${adjPct}% TM</span>`:''}</div>
        </div>
        <div class="ring-wrap" style="margin-left:10px">
          <svg width="40" height="40" style="transform:rotate(-90deg)">
            <circle cx="20" cy="20" r="17" fill="none" stroke="#1A1A1A" stroke-width="3"/>
            <circle cx="20" cy="20" r="17" fill="none" stroke="${allDn?'#27AE60':'#C9A84C'}"
              stroke-width="3" stroke-dasharray="${C}" stroke-dashoffset="${C*(1-exDn/sets.length)}"
              stroke-linecap="round"/>
          </svg>
          <div class="ring-inner" style="color:${allDn?'#27AE60':'#C9A84C'}">${exDn}/${sets.length}</div>
        </div>
      </div>
      <div class="sets-wrap">
        <div class="tbl-header">
          <div class="tbl-lbl">SET</div>
          <div class="tbl-lbl">WEIGHT (kg)</div>
          <div class="tbl-lbl">REPS</div>
          <div class="tbl-lbl">✓</div>
        </div>
        ${rows}
      </div>
      ${summaryHtml}
    </div>`;
  });

  dc.innerHTML=h;
}

// ── PROGRESS CHARTS ───────────────────────────────────────────────────────────
function renderProgressCharts(){
  const container=document.getElementById("progress-inner");
  if(!container)return;

  // Collect best weight per exercise per week
  const exNames=[...new Set(PROG.map(e=>e.ex))];
  let html='<div class="progress-page"><div class="progress-title">YOUR JOURNEY</div><div class="progress-heading">PROGRESS CHARTS</div>';

  let hasAnyData=false;

  exNames.forEach(exName=>{
    const dataPoints=[];
    for(let w=1;w<=6;w++){
      const ex=PROG.find(e=>e.ex===exName);
      if(!ex)return;
      const sets=LOG[w]?.[ex.day]?.[exName]||[];
      const wts=sets.map(s=>parseFloat(s.wt)).filter(v=>!isNaN(v)&&v>0);
      if(wts.length>0) dataPoints.push({wk:w,maxWt:Math.max(...wts)});
    }
    if(dataPoints.length<1)return;
    hasAnyData=true;

    const maxVal=Math.max(...dataPoints.map(d=>d.maxWt));
    const minVal=Math.min(...dataPoints.map(d=>d.maxWt));
    const first=dataPoints[0].maxWt;
    const last=dataPoints[dataPoints.length-1].maxWt;
    const change=last-first;
    const id="chart_"+eid(exName);

    html+=`<div class="graph-card">
      <div class="graph-hdr">
        <div class="graph-ex-name">${exName}</div>
        <div class="graph-meta">BEST SET WEIGHT PER WEEK</div>
      </div>
      <div class="graph-body">
        <canvas id="${id}" class="chart" width="400" height="120"></canvas>
      </div>
      <div class="graph-stats">
        <div class="gstat"><div class="gstat-lbl">START</div><span class="gstat-val">${first} kg</span></div>
        <div class="gstat"><div class="gstat-lbl">BEST</div><span class="gstat-val">${maxVal} kg</span></div>
        <div class="gstat"><div class="gstat-lbl">PROGRESS</div><span class="gstat-val" style="color:${change>=0?'#27AE60':'#FF5555'}">${change>=0?'+':''}${change} kg</span></div>
      </div>
    </div>`;
  });

  if(!hasAnyData){
    html+=`<div class="no-data">📊 NO DATA YET<br/><br/>Log your workouts and your progress charts will appear here.</div>`;
  }

  html+='</div>';
  container.innerHTML=html;

  // Draw charts
  exNames.forEach(exName=>{
    const dataPoints=[];
    for(let w=1;w<=6;w++){
      const ex=PROG.find(e=>e.ex===exName);
      if(!ex)return;
      const sets=LOG[w]?.[ex.day]?.[exName]||[];
      const wts=sets.map(s=>parseFloat(s.wt)).filter(v=>!isNaN(v)&&v>0);
      if(wts.length>0) dataPoints.push({wk:w,maxWt:Math.max(...wts)});
    }
    if(dataPoints.length<1)return;

    const canvas=document.getElementById("chart_"+eid(exName));
    if(!canvas)return;
    drawChart(canvas,dataPoints);
  });
}

function drawChart(canvas,data){
  const ctx=canvas.getContext("2d");
  const W=canvas.offsetWidth||400;
  const H=canvas.offsetHeight||120;
  canvas.width=W*2;canvas.height=H*2;
  ctx.scale(2,2);

  const pad={top:10,right:16,bottom:24,left:40};
  const cw=W-pad.left-pad.right;
  const ch=H-pad.top-pad.bottom;

  const vals=data.map(d=>d.maxWt);
  const minV=Math.min(...vals)*0.95;
  const maxV=Math.max(...vals)*1.05;
  const range=maxV-minV||1;

  function xPos(i){return pad.left+i*(cw/(data.length-1||1));}
  function yPos(v){return pad.top+ch-(((v-minV)/range)*ch);}

  // Background
  ctx.fillStyle="#0F0F0F";
  ctx.fillRect(0,0,W,H);

  // Grid lines
  ctx.strokeStyle="#1A1A1A";
  ctx.lineWidth=1;
  [0,.25,.5,.75,1].forEach(t=>{
    const y=pad.top+ch*t;
    ctx.beginPath();ctx.moveTo(pad.left,y);ctx.lineTo(pad.left+cw,y);ctx.stroke();
  });

  // Area fill
  if(data.length>1){
    const grad=ctx.createLinearGradient(0,pad.top,0,pad.top+ch);
    grad.addColorStop(0,"rgba(201,168,76,0.3)");
    grad.addColorStop(1,"rgba(201,168,76,0)");
    ctx.beginPath();
    ctx.moveTo(xPos(0),yPos(data[0].maxWt));
    data.forEach((d,i)=>ctx.lineTo(xPos(i),yPos(d.maxWt)));
    ctx.lineTo(xPos(data.length-1),pad.top+ch);
    ctx.lineTo(xPos(0),pad.top+ch);
    ctx.closePath();
    ctx.fillStyle=grad;
    ctx.fill();
  }

  // Line
  ctx.strokeStyle="#C9A84C";
  ctx.lineWidth=2;
  ctx.lineJoin="round";
  ctx.beginPath();
  data.forEach((d,i)=>{
    i===0?ctx.moveTo(xPos(i),yPos(d.maxWt)):ctx.lineTo(xPos(i),yPos(d.maxWt));
  });
  ctx.stroke();

  // Dots + labels
  data.forEach((d,i)=>{
    const x=xPos(i),y=yPos(d.maxWt);
    ctx.fillStyle="#C9A84C";
    ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle="#fff";
    ctx.beginPath();ctx.arc(x,y,2,0,Math.PI*2);ctx.fill();

    // Weight label
    ctx.fillStyle="#C9A84C";
    ctx.font="bold 9px Arial";
    ctx.textAlign="center";
    ctx.fillText(d.maxWt+"kg",x,y-8);

    // Week label
    ctx.fillStyle="#444";
    ctx.font="8px Arial";
    ctx.fillText("W"+d.wk,x,pad.top+ch+14);
  });

  // Y axis labels
  ctx.fillStyle="#333";
  ctx.font="8px Arial";
  ctx.textAlign="right";
  [0,.5,1].forEach(t=>{
    const v=Math.round(minV+range*t);
    const y=pad.top+ch*(1-t);
    ctx.fillText(v,pad.left-4,y+3);
  });
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
function swWk(w){
  cW=w;cD=1;
  pageIdx=PAGES.findIndex(p=>p.w===w&&p.d===1);
  renderAll();
  document.getElementById("workout-scroll").scrollTop=0;
}
function swDy(d){
  cD=d;
  pageIdx=PAGES.findIndex(p=>p.w===cW&&p.d===d);
  renderDyTabs();
  renderNavbar();
  renderDay();
  document.getElementById("workout-scroll").scrollTop=0;
}
function upd(ex,i,f,v){
  LOG[cW][cD][ex][i][f]=v;
  renderTopbar();renderDyTabs();renderDay();
  saveAll();
}
function tog(ex,i){
  LOG[cW][cD][ex][i].done^=true;
  renderTopbar();renderDyTabs();renderDay();
  saveAll();
}

// ── INIT ──────────────────────────────────────────────────────────────────────
const hasData=loadAll();
if(hasData){
  ensureLog();
  document.getElementById("setup").classList.remove("active");
  document.getElementById("app").classList.add("active");
  renderSetup();
  renderAll();
} else {
  renderSetup();
}
</script>
